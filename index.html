<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>McKinney Now AI Newsroom</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f4f8; min-height: 100vh; }
header { background: #1a3a5c; color: white; padding: 20px 24px; }
header h1 { font-size: 1.6rem; font-weight: 700; }
header p { font-size: 0.9rem; opacity: 0.8; margin-top: 4px; }
.container { max-width: 860px; margin: 32px auto; padding: 0 16px; }
.card { background: white; border-radius: 12px; padding: 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 24px; }
.card h2 { font-size: 1.1rem; font-weight: 600; color: #1a3a5c; margin-bottom: 18px; padding-bottom: 10px; border-bottom: 2px solid #e8edf2; }
label { display: block; font-size: 0.85rem; font-weight: 600; color: #4a5568; margin-bottom: 6px; margin-top: 16px; }
label:first-of-type { margin-top: 0; }
textarea, select { width: 100%; padding: 10px 14px; border: 1.5px solid #cbd5e0; border-radius: 8px; font-size: 0.95rem; background: #f7fafc; color: #2d3748; font-family: inherit; }
textarea:focus, select:focus { outline: none; border-color: #1a3a5c; background: white; }
textarea { resize: vertical; min-height: 90px; }
.row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.btn { display: inline-flex; align-items: center; gap: 8px; background: #1a3a5c; color: white; border: none; padding: 12px 28px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 20px; }
.btn:hover { background: #2d5a8e; }
#status-section { display: none; }
.steps { display: flex; gap: 8px; margin-bottom: 24px; }
.step { padding: 6px 14px; border-radius: 20px; font-size: 0.82rem; font-weight: 600; background: #e8edf2; color: #718096; }
.step.active { background: #1a3a5c; color: white; }
.step.done { background: #38a169; color: white; }
.error-box { background: #fff5f5; border: 1.5px solid #fc8181; border-radius: 8px; padding: 14px 18px; color: #c53030; font-size: 0.92rem; margin-bottom: 16px; }
#results-section { display: none; }
.result-block { border: 1.5px solid #e2e8f0; border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
.result-header { background: #f7fafc; padding: 12px 18px; font-weight: 700; font-size: 0.9rem; color: #1a3a5c; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
.result-header:hover { background: #edf2f7; }
.result-content { padding: 16px 18px; font-size: 0.93rem; color: #2d3748; line-height: 1.65; white-space: pre-wrap; display: none; }
.result-block.expanded .result-content { display: block; }
.copy-btn { background: none; border: 1.5px solid #cbd5e0; border-radius: 6px; padding: 4px 12px; font-size: 0.78rem; color: #4a5568; cursor: pointer; font-weight: 600; }
.copy-btn:hover { background: #edf2f7; }
.tag { display: inline-block; background: #ebf8ff; color: #2b6cb0; font-size: 0.75rem; font-weight: 600; padding: 2px 8px; border-radius: 12px; margin-left: 6px; }
</style>
</head>
<body>
<header>
  <h1>McKinney Now AI Newsroom</h1>
  <p>Turn your story tips into polished, multi-format content instantly</p>
</header>
<div class="container">
  <div class="card" id="form-section">
    <h2>Step 1 - Enter Your Story Tip</h2>
    <label for="story-tip">Story Tip *</label>
    <textarea id="story-tip" placeholder="Describe the story - who, what, where, when..."></textarea>
    <label for="extra-details">Extra Details (optional)</label>
    <textarea id="extra-details" placeholder="Address, hours, links, quotes, contact info..."></textarea>
    <div class="row">
      <div>
        <label for="category">Category</label>
        <select id="category">
          <option value="New opening">New opening</option>
          <option value="Local event">Local event</option>
          <option value="Community news">Community news</option>
          <option value="Business update">Business update</option>
          <option value="Government and policy">Government and policy</option>
          <option value="Arts and culture">Arts and culture</option>
          <option value="Sports">Sports</option>
          <option value="Development and real estate">Development and real estate</option>
          <option value="Crime and safety">Crime and safety</option>
          <option value="Education">Education</option>
          <option value="Human interest">Human interest</option>
        </select>
      </div>
      <div>
        <label for="tone">Tone</label>
        <select id="tone">
          <option value="Friendly and conversational">Friendly and conversational</option>
          <option value="Professional and neutral">Professional and neutral</option>
          <option value="Upbeat and exciting">Upbeat and exciting</option>
          <option value="Serious and informative">Serious and informative</option>
        </select>
      </div>
      <div>
        <label for="location">Location</label>
        <select id="location">
          <option value="McKinney, TX">McKinney, TX</option>
          <option value="Frisco, TX">Frisco, TX</option>
          <option value="Allen, TX">Allen, TX</option>
          <option value="Plano, TX">Plano, TX</option>
          <option value="Collin County, TX">Collin County, TX</option>
        </select>
      </div>
    </div>
    <button class="btn" id="generate-btn" onclick="generateContent()">Research and generate</button>
  </div>

  <div class="card" id="status-section">
    <h2>Generating Your Content</h2>
    <div class="steps">
      <div class="step active" id="step-research">Research</div>
      <div class="step" id="step-write">Writing</div>
      <div class="step" id="step-format">Formatting</div>
    </div>
    <div id="error-container"></div>
    <p id="status-msg" style="color:#4a5568;font-size:0.93rem;">Connecting to AI...</p>
  </div>

  <div id="results-section">
    <div class="card">
      <h2>Generated Content</h2>
      <p id="results-story-title" style="color:#4a5568;font-size:0.9rem;margin-bottom:16px;"></p>
      <div id="results-blocks"></div>
      <button class="btn" onclick="resetForm()" style="background:#38a169;margin-top:8px;">New Story</button>
    </div>
  </div>
</div>

<script>
function generateContent() {
  var tip = document.getElementById('story-tip').value.trim();
  if (!tip) { alert('Please enter a story tip.'); return; }
  var extra = document.getElementById('extra-details').value.trim();
  var category = document.getElementById('category').value;
  var tone = document.getElementById('tone').value;
  var location = document.getElementById('location').value;

  document.getElementById('form-section').style.display = 'none';
  document.getElementById('status-section').style.display = 'block';
  document.getElementById('results-section').style.display = 'none';
  document.getElementById('error-container').innerHTML = '';
  setStep('research');
  setStatus('Researching your story tip...');

  var prompt = 'You are a local news journalist for McKinney Now, a digital news outlet covering ' + location + '.\n\n'
    + 'STORY TIP: ' + tip + '\n'
    + (extra ? 'EXTRA DETAILS: ' + extra + '\n' : '')
    + 'CATEGORY: ' + category + '\n'
    + 'TONE: ' + tone + '\n\n'
    + 'Generate all 5 content formats with these exact section headers:\n\n'
    + '## FACEBOOK POST\n'
    + 'A 2-4 sentence Facebook post. Conversational, engaging, ends with a call to action. 2-3 hashtags.\n\n'
    + '## REEL SCRIPT\n'
    + '30-45 second reel script with [HOOK], [MAIN CONTENT], and [CTA] labeled sections.\n\n'
    + '## INSTAGRAM CAPTION\n'
    + 'Strong opening line, key details, 5-8 hashtags at end.\n\n'
    + '## NEWSLETTER BLURB\n'
    + '3-4 sentences. Professional but friendly. For email newsletter.\n\n'
    + '## WEBSITE ARTICLE\n'
    + 'Full article with headline, byline (By McKinney Now Staff), and 3-4 paragraphs. Journalistic inverted pyramid style for ' + location + '.';

  setTimeout(function() { setStep('write'); setStatus('AI is writing your content...'); }, 1000);

  fetch('/api/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-opus-4-5',
      max_tokens: 2000,
      messages: [{ role: 'user', content: prompt }]
    })
  })
  .then(function(response) {
    return response.json().then(function(data) {
      if (!response.ok || data.error) {
        var msg = (data.error && data.error.message) ? data.error.message : (data.error || ('API error ' + response.status));
        throw new Error(msg);
      }
      return data;
    });
  })
  .then(function(data) {
    setStep('format');
    setStatus('Formatting results...');
    var text = (data.content && data.content[0] && data.content[0].text) ? data.content[0].text : '';
    // Strip markdown code block wrapper if present
    text = text.replace(/^```[\w]*\n?/m, '').replace(/\n?```$/m, '').trim();
    if (!text) throw new Error('No content returned from AI.');
    setTimeout(function() { displayResults(text, tip); }, 400);
  })
  .catch(function(err) {
    showError(err.message);
  });
}

function setStep(step) {
  var steps = ['research', 'write', 'format'];
  for (var i = 0; i < steps.length; i++) {
    var el = document.getElementById('step-' + steps[i]);
    var cur = steps.indexOf(step);
    if (i < cur) el.className = 'step done';
    else if (i === cur) el.className = 'step active';
    else el.className = 'step';
  }
}

function setStatus(msg) {
  document.getElementById('status-msg').textContent = msg;
}

function showError(msg) {
  document.getElementById('error-container').innerHTML = '<div class="error-box"><strong>Error:</strong> ' + escHtml(msg) + '</div>';
  document.getElementById('status-msg').textContent = 'Something went wrong. See error above.';
  document.getElementById('form-section').style.display = 'block';
  document.getElementById('status-section').style.display = 'none';
}

function displayResults(text, tip) {
  document.getElementById('status-section').style.display = 'none';
  document.getElementById('results-section').style.display = 'block';
  var shortTip = tip.length > 80 ? tip.substring(0, 80) + '...' : tip;
  document.getElementById('results-story-title').textContent = shortTip;

  var formats = [
    { key: 'FACEBOOK POST', label: 'Facebook Post', tag: 'Social' },
    { key: 'REEL SCRIPT', label: 'Reel Script', tag: 'Video' },
    { key: 'INSTAGRAM CAPTION', label: 'Instagram Caption', tag: 'Social' },
    { key: 'NEWSLETTER BLURB', label: 'Newsletter Blurb', tag: 'Email' },
    { key: 'WEBSITE ARTICLE', label: 'Website Article', tag: 'Web' }
  ];

  var container = document.getElementById('results-blocks');
  container.innerHTML = '';

  for (var i = 0; i < formats.length; i++) {
    var fmt = formats[i];
    var re = new RegExp('##\\s*' + fmt.key + '\\s*\\n([\\s\\S]*?)(?=\\n---\\n|\\n## |$)', 'i');
    var match = text.match(re);
    var content = match ? match[1].trim() : 'Content not generated for this section.';
    var isFirst = (i === 0);
    var block = document.createElement('div');
    block.className = isFirst ? 'result-block expanded' : 'result-block';
    block.setAttribute('data-idx', i);

    var header = document.createElement('div');
    header.className = 'result-header';
    header.innerHTML = '<span>' + escHtml(fmt.label) + '<span class="tag">' + escHtml(fmt.tag) + '</span></span>';

    var copyBtn = document.createElement('button');
    copyBtn.className = 'copy-btn';
    copyBtn.textContent = 'Copy';
    copyBtn.setAttribute('data-content', content);
    copyBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      var c = this.getAttribute('data-content');
      if (navigator.clipboard) {
        var self = this;
        navigator.clipboard.writeText(c).then(function() {
          self.textContent = 'Copied!';
          setTimeout(function() { self.textContent = 'Copy'; }, 1500);
        });
      }
    });

    header.appendChild(copyBtn);

    header.addEventListener('click', function(e) {
      if (e.target.classList.contains('copy-btn')) return;
      var b = this.parentElement;
      if (b.classList.contains('expanded')) {
        b.classList.remove('expanded');
      } else {
        b.classList.add('expanded');
      }
    });

    var contentDiv = document.createElement('div');
    contentDiv.className = 'result-content';
    contentDiv.textContent = content;

    block.appendChild(header);
    block.appendChild(contentDiv);
    container.appendChild(block);
  }

  window.scrollTo({ top: document.getElementById('results-section').offsetTop - 20, behavior: 'smooth' });
}

function escHtml(t) {
  return String(t).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function resetForm() {
  document.getElementById('form-section').style.display = 'block';
  document.getElementById('status-section').style.display = 'none';
  document.getElementById('results-section').style.display = 'none';
  document.getElementById('story-tip').value = '';
  document.getElementById('extra-details').value = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
