<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>McKinney Now AI Newsroom</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f4f8; min-height: 100vh; }
header { background: #1a3a5c; color: white; padding: 20px 24px; }
header h1 { font-size: 1.6rem; font-weight: 700; }
header p { font-size: 0.9rem; opacity: 0.8; margin-top: 4px; }
.container { max-width: 860px; margin: 32px auto; padding: 0 16px; }
.card { background: white; border-radius: 12px; padding: 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 24px; }
.card h2 { font-size: 1.1rem; font-weight: 600; color: #1a3a5c; margin-bottom: 18px; padding-bottom: 10px; border-bottom: 2px solid #e8edf2; }
label { display: block; font-size: 0.85rem; font-weight: 600; color: #4a5568; margin-bottom: 6px; margin-top: 16px; }
label:first-of-type { margin-top: 0; }
textarea, select { width: 100%; padding: 10px 14px; border: 1.5px solid #cbd5e0; border-radius: 8px; font-size: 0.95rem; background: #f7fafc; color: #2d3748; font-family: inherit; }
textarea:focus, select:focus { outline: none; border-color: #1a3a5c; background: white; }
textarea { resize: vertical; min-height: 90px; }
.row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.btn { display: inline-flex; align-items: center; gap: 8px; background: #1a3a5c; color: white; border: none; padding: 12px 28px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 20px; }
.btn:hover { background: #2d5a8e; }
.btn-search { background: #38a169; }
.btn-search:hover { background: #2f855a; }
.btn-search:disabled, .btn:disabled { background: #a0aec0; cursor: not-allowed; }
#status-section { display: none; }
.steps { display: flex; gap: 8px; margin-bottom: 24px; }
.step { padding: 6px 14px; border-radius: 20px; font-size: 0.82rem; font-weight: 600; background: #e8edf2; color: #718096; }
.step.active { background: #1a3a5c; color: white; }
.step.done { background: #38a169; color: white; }
.error-box { background: #fff5f5; border: 1.5px solid #fc8181; border-radius: 8px; padding: 14px 18px; color: #c53030; font-size: 0.92rem; margin-bottom: 16px; }
#results-section { display: none; }
.result-block { border: 1.5px solid #e2e8f0; border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
.result-header { background: #f7fafc; padding: 12px 18px; font-weight: 700; font-size: 0.9rem; color: #1a3a5c; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
.result-header:hover { background: #edf2f7; }
.result-content { padding: 16px 18px; font-size: 0.93rem; color: #2d3748; line-height: 1.65; white-space: pre-wrap; display: none; }
.result-block.expanded .result-content { display: block; }
.copy-btn { background: none; border: 1.5px solid #cbd5e0; border-radius: 6px; padding: 4px 12px; font-size: 0.78rem; color: #4a5568; cursor: pointer; font-weight: 600; }
.copy-btn:hover { background: #edf2f7; }
/* News search panel */
.news-panel { display: none; margin-top: 20px; border: 1.5px solid #bee3f8; border-radius: 10px; overflow: hidden; }
.news-panel.visible { display: block; }
.news-panel-header { background: #ebf8ff; padding: 12px 16px; font-weight: 700; font-size: 0.9rem; color: #2b6cb0; border-bottom: 1px solid #bee3f8; }
.news-loading { padding: 20px; text-align: center; color: #718096; font-size: 0.9rem; }
.news-item { padding: 12px 16px; border-bottom: 1px solid #e2e8f0; cursor: pointer; transition: background 0.15s; }
.news-item:last-child { border-bottom: none; }
.news-item:hover { background: #ebf8ff; }
.news-item-title { font-weight: 600; font-size: 0.9rem; color: #2d3748; margin-bottom: 4px; }
.news-item-meta { font-size: 0.78rem; color: #718096; }
.news-item-desc { font-size: 0.82rem; color: #4a5568; margin-top: 4px; line-height: 1.4; }
.use-story-hint { font-size: 0.75rem; color: #38a169; font-weight: 600; margin-top: 4px; }
</style>
</head>
<body>
<header>
  <h1>McKinney Now AI Newsroom</h1>
  <p>Find real McKinney news &amp; generate multi-format content in seconds</p>
</header>

<div class="container">

  <!-- Step 1: Input -->
  <div class="card" id="input-card">
    <h2>Step 1 — Story Input</h2>

    <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:8px;">
      <button class="btn btn-search" id="find-news-btn" onclick="findMcKinneyNews()">
        🔍 Find McKinney News
      </button>
      <span style="font-size:0.82rem;color:#718096;">Click to load real recent stories from McKinney, TX</span>
    </div>

    <!-- News results panel -->
    <div class="news-panel" id="news-panel">
      <div class="news-panel-header">📰 Recent McKinney News — Click a story to use it</div>
      <div id="news-list"><div class="news-loading">Loading...</div></div>
    </div>

    <label for="story-tip">Story Tip *</label>
    <textarea id="story-tip" placeholder="Paste a news tip, press release, or story idea here..."></textarea>

    <label for="extra-details">Extra Details (optional)</label>
    <textarea id="extra-details" placeholder="Address, hours, quotes, social handles, etc."></textarea>

    <div class="row">
      <div>
        <label for="category">Category</label>
        <select id="category">
          <option>New opening</option>
          <option>Local event</option>
          <option>Crime &amp; safety</option>
          <option>City government</option>
          <option>Development / real estate</option>
          <option>Schools &amp; education</option>
          <option>Sports</option>
          <option>Community &amp; people</option>
          <option>Business news</option>
          <option>Other</option>
        </select>
      </div>
      <div>
        <label for="tone">Tone</label>
        <select id="tone">
          <option>Friendly &amp; conversational</option>
          <option>Professional &amp; neutral</option>
          <option>Energetic &amp; exciting</option>
          <option>Serious &amp; informative</option>
        </select>
      </div>
      <div>
        <label for="location">Location</label>
        <select id="location">
          <option>McKinney, TX</option>
          <option>Downtown McKinney</option>
          <option>Prosper, TX</option>
          <option>Frisco, TX</option>
          <option>Allen, TX</option>
          <option>Collin County</option>
        </select>
      </div>
    </div>

    <button class="btn" onclick="generateContent()">✨ Research &amp; generate</button>
  </div>

  <!-- Step 2+: Status -->
  <div id="status-section">
    <div class="steps">
      <div class="step" id="step1">1 Input</div>
      <div class="step" id="step2">2 Research</div>
      <div class="step" id="step3">3 Generate</div>
      <div class="step" id="step4">4 Done</div>
    </div>
    <div id="error-box" class="error-box" style="display:none;"></div>
    <div id="loading-msg" style="text-align:center;color:#718096;padding:20px 0;font-size:0.95rem;"></div>
  </div>

  <!-- Results -->
  <div id="results-section">
    <div class="card">
      <h2>Generated Content</h2>
      <div id="results-container"></div>
    </div>
  </div>

</div>

<script>
// ---- News search ----
async function findMcKinneyNews() {
  const btn = document.getElementById('find-news-btn');
  const panel = document.getElementById('news-panel');
  const list = document.getElementById('news-list');

  btn.disabled = true;
  btn.textContent = '⏳ Loading news...';
  panel.classList.add('visible');
  list.innerHTML = '<div class="news-loading">Fetching recent McKinney news...</div>';

  try {
    const res = await fetch('/.netlify/functions/search');
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    if (!data.stories || data.stories.length === 0) {
      list.innerHTML = '<div class="news-loading">No stories found. Try entering your own tip below.</div>';
      return;
    }

    list.innerHTML = '';
    data.stories.forEach((story, i) => {
      const div = document.createElement('div');
      div.className = 'news-item';
      div.innerHTML = `
        <div class="news-item-title">${escHtml(story.title)}</div>
        <div class="news-item-meta">${escHtml(story.source || '')} ${story.pubDate ? '· ' + formatDate(story.pubDate) : ''}</div>
        ${story.description ? '<div class="news-item-desc">' + escHtml(story.description.substring(0, 200)) + '</div>' : ''}
        <div class="use-story-hint">👆 Click to use this story</div>
      `;
      div.onclick = () => useStory(story);
      list.appendChild(div);
    });
  } catch (err) {
    list.innerHTML = '<div class="news-loading" style="color:#c53030;">Error loading news: ' + escHtml(err.message) + '. Try entering a tip manually.</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = '🔍 Find McKinney News';
  }
}

function useStory(story) {
  document.getElementById('story-tip').value = story.title + (story.description ? '\n\n' + story.description : '');
  document.getElementById('extra-details').value = story.link ? 'Source: ' + story.link : '';
  // Scroll to the textarea
  document.getElementById('story-tip').scrollIntoView({ behavior: 'smooth', block: 'center' });
  document.getElementById('story-tip').focus();
  // Highlight the selected item
  document.querySelectorAll('.news-item').forEach(el => el.style.background = '');
  event.currentTarget.style.background = '#c6f6d5';
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(str) {
  try { return new Date(str).toLocaleDateString('en-US', {month:'short', day:'numeric'}); } catch(e) { return ''; }
}

// ---- Content generation ----
function setStep(n) {
  ['step1','step2','step3','step4'].forEach((id, i) => {
    const el = document.getElementById(id);
    if (i + 1 < n) el.className = 'step done';
    else if (i + 1 === n) el.className = 'step active';
    else el.className = 'step';
  });
}

function showStatus(msg) {
  document.getElementById('status-section').style.display = 'block';
  document.getElementById('loading-msg').textContent = msg;
  document.getElementById('error-box').style.display = 'none';
}

function showError(msg) {
  document.getElementById('status-section').style.display = 'block';
  document.getElementById('loading-msg').textContent = '';
  const eb = document.getElementById('error-box');
  eb.style.display = 'block';
  eb.textContent = msg;
}

async function generateContent() {
  const tip = document.getElementById('story-tip').value.trim();
  if (!tip) { alert('Please enter a story tip.'); return; }

  document.getElementById('results-section').style.display = 'none';
  setStep(2);
  showStatus('Step 2: Researching your story...');

  const extra = document.getElementById('extra-details').value.trim();
  const category = document.getElementById('category').value;
  const tone = document.getElementById('tone').value;
  const location = document.getElementById('location').value;

  const prompt = `You are a local news content creator for "${location}". Based on the story tip, create all 5 content formats below. Use the tone: ${tone}. Category: ${category}.

STORY TIP:
${tip}

EXTRA DETAILS:
${extra || 'None provided'}

Output EXACTLY this structure with --- dividers:

## Facebook Post
Write a Facebook post (150-200 words) with 3-5 relevant hashtags. Include a call to action.

---

## Reel Script
Write a short-form video script (45-60 seconds). Include [HOOK], [MAIN CONTENT], [CTA] labels.

---

## Instagram Caption
Write an Instagram caption (100-150 words) with 8-10 hashtags and relevant emojis.

---

## Newsletter Blurb
Write a newsletter blurb (3-4 sentences, professional tone) for a community newsletter.

---

## Website Article
Write a news article with a headline, byline "By McKinney Now Staff", and 4 paragraphs.`;

  setStep(3);
  showStatus('Step 3: Generating content with AI...');

  try {
    const res = await fetch('/.netlify/functions/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 2500,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));

    const rawText = data.content[0].text;
    // Strip markdown code block wrapper if present
    let text = rawText.replace(/^```[w]*\n?/m, '').replace(/\n?```$/m, '').trim();

    setStep(4);
    showStatus('');
    document.getElementById('loading-msg').textContent = '';

    renderResults(text);
  } catch (err) {
    showError('Error: ' + err.message);
  }
}

function renderResults(text) {
  const sections = [
    { key: 'Facebook Post', icon: '📘' },
    { key: 'Reel Script', icon: '🎬' },
    { key: 'Instagram Caption', icon: '📸' },
    { key: 'Newsletter Blurb', icon: '📧' },
    { key: 'Website Article', icon: '📰' }
  ];

  const container = document.getElementById('results-container');
  container.innerHTML = '';

  sections.forEach(({ key, icon }) => {
    const headerRe = new RegExp('##\\s*' + key, 'i');
    const match = text.match(headerRe);
    if (!match) return;

    const startIdx = match.index + match[0].length;
    const rest = text.slice(startIdx);
    const endMatch = rest.match(/\n---\n|\n## /);
    const content = (endMatch ? rest.slice(0, endMatch.index) : rest).trim();

    const block = document.createElement('div');
    block.className = 'result-block expanded';
    block.innerHTML = `
      <div class="result-header" onclick="this.parentElement.classList.toggle('expanded')">
        <span>${icon} ${key}</span>
        <button class="copy-btn" onclick="event.stopPropagation(); copyContent(this)">Copy</button>
      </div>
      <div class="result-content">${content || 'Content not generated for this section.'}</div>
    `;
    container.appendChild(block);
  });

  document.getElementById('results-section').style.display = 'block';
  document.getElementById('results-section').scrollIntoView({ behavior: 'smooth' });
}

function copyContent(btn) {
  const content = btn.closest('.result-block').querySelector('.result-content').textContent;
  navigator.clipboard.writeText(content).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  });
}
</script>
</body>
</html>
